<!DOCTYPE html>
<html>
<head>
    <title>2473025-Vito Elroy Wiratara</title>
</head>
<body>

<form action="" method="POST">
    <table style="border: 1px solid black; padding: 15px 30px 0px 10px;" cellpadding="3" cellspacing="0">
        <tr>
            <td colspan="3">
                <h2 style="margin: 0 0 10px 0;">Form Tambah Data User</h2>
            </td>
        </tr>
        <tr>
            <td>Name&nbsp;</td>
            <td>:</td>
            <td><input type="text" name="nama" size="25" required oninvalid="this.setCustomValidity('Name is required!!!')" oninput="this.setCustomValidity('')"></td>
        </tr>
        <tr>
            <td>Address&nbsp;</td>
            <td>:</td>
            <td><input type="text" name="alamat" size="25" required oninvalid="this.setCustomValidity('Address is required!!!')" oninput="this.setCustomValidity('')"></td>
        </tr>
        <tr>
            <td>Email&nbsp;</td>
            <td>:</td>
            <td><input type="email" name="email" size="25" required oninvalid="this.setCustomValidity('Harap isi bidang ini.')" oninput="this.setCustomValidity('')"></td>
        </tr>
        <tr>
            <td>Home Page&nbsp;</td>
            <td>:</td>
            <td><input type="url" name="homepage" size="25"></td>
        </tr>
        <tr>
            <td>Birthday&nbsp;</td>
            <td>:</td>
            <td><input type="date" name="birthday"></td>
        </tr>
        <tr>
            <td>Favorit Color&nbsp;</td>
            <td>:</td>
            <td><input type="color" name="favcolor" value="#000000"></td>
        </tr>
        <tr>
            <td>IPK&nbsp;</td>
            <td>:</td>
            <td><input type="number" name="ipk" min="0" max="4" step="0.1" value="0" style="width: 50px;"></td>
        </tr>
        <tr>
            <td>Phone Number&nbsp;</td>
            <td>:</td>
            <td><input type="tel" name="phone" size="25" pattern="[0-9]{3}-[0-9]{7,10}"></td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td>
                <input type="submit" value="Add">
            </td>
        </tr>
    </table>
</form>

</body>
</html>
