<!DOCTYPE html>
<html>
<head>
    <title>2473025-Vito Elroy Wiratara</title>
</head>
<body>

<table border="1" cellpadding="0">
    <tr>
        <th colspan="2" bgcolor="#cccccc" style="padding: 5px;">
            <span style="font-size: 32px; font-weight: normal;">Edit profile</span>
        </th>
    </tr>
    <tr>
        <td align="center" valign="top" width="120" style="padding: 0; padding-top: 4px;">
            <img src="tim.jpg" alt="Profile Picture" width="120" style="display: block; margin: 0;">
            
            <div style="margin-top: 4px; margin-bottom: 6px;">
                <input type="button" value="Upload">
            </div>
        </td>
        
        <td valign="top" style="padding: 4px;">
            <table border="0" cellpadding="4" cellspacing="0">
                <tr>
                    <td>Name</td>
                    <td>Tim Berners-Lee</td>
                </tr>
                <tr>
                    <td>Position</td>
                    <td>
                        <select name="position" style="width: 170px; box-sizing: border-box;">
                            <optgroup label="Programmer">
                                <option selected>Senior Programmer</option>
                                <option>Junior Programmer</option>
                            </optgroup>
                            <optgroup label="System Analyst">
                                <option>Senior Analyst</option>
                                <option>Junior Analyst</option>
                            </optgroup>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>Password</td>
                    <td><input type="text" name="password" value="admin" style="width: 170px; box-sizing: border-box;"></td>
                </tr>
                <tr>
                    <td>Confirm Password</td>
                    <td><input type="password" name="confirm_password" value="admin" style="width: 170px; box-sizing: border-box;"></td>
                </tr>
                <tr>
                    <td colspan="2" align="right" style="padding-top: 35px;">
                        <input type="reset" value="Reset">
                        <input type="submit" value="Update">
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>

</body>
</html>
