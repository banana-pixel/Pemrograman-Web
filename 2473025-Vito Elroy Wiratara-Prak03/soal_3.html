<!DOCTYPE html>
<html>
<head>
    <title>2473025-Vito Elroy Wiratara</title>
</head>
<body>

<form action="proses.html" method="POST">
    <table border="2" cellpadding="0" cellspacing="0" width="450">
        <tr>
            <td>
                <table border="0" cellpadding="0" width="100%">
                    <tr>
                        <th colspan="2" style="
                            background-color: gray;
                            color: white;
                            border-top: 5px solid black;
                            border-bottom: 2px solid black;
                            padding: 0px;
                        ">Personal Data</th>
                    </tr>

                    
                    
                    <tr>
                        <td width="120">Nama</td>
                        <td><input type="text" name="nama"></td>
                    </tr>
                    <tr>
                        <td valign="center">Alamat</td>
                        <td><textarea name="alamat" cols="22" rows="3"></textarea></td>
                    </tr>
                    <tr>
                        <td valign="center">Jenis Kelamin</td>
                        <td>
                            <input id="lk" type="radio" name="jk" value="laki-laki"/>
                            <label for="lk">laki-laki</label><br>
                            <input id="pr" type="radio" name="jk" value="perempuan"/>
                            <label for="pr">perempuan</label>
                        </td>
                    </tr>
                    <tr>
                        <td>Tanggal Lahir</td>
                        <td>
                            <select name="tgl">
                                <option>1</option>
                                <option>2</option>
                                <option>3</option>
                            </select> - 
                            <select name="bln">
                                <option>Januari</option>
                                <option>Februari</option>
                            </select> - 
                            <select name="thn">
                                <option>1980</option>
                                <option>1981</option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td valign="center">Jurusan</td>
                        <td>
                            <select name="jurusan" width="100" multiple="multiple" size="4">
                                <option>teknik informatika</option>
                                <option>sistem informasi</option>
                                <option>elektro</option>
                                <option>sipil</option>
                                <option>komputer</option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td colspan="2">
                            <fieldset style="margin-bottom: 10px;">
                                <legend>Hobi</legend>
                                <table width="100%" border="0">
                                    <tr>
                                        <td><input type="checkbox" name="hobi" value="Membaca"> Membaca</td>
                                        <td><input type="checkbox" name="hobi" value="Voli"> Voli</td>
                                    </tr>
                                    <tr>
                                        <td><input type="checkbox" name="hobi" value="Menulis"> Menulis</td>
                                        <td><input type="checkbox" name="hobi" value="Badminton"> Badminton</td>
                                    </tr>
                                    <tr>
                                        <td><input type="checkbox" name="hobi" value="Catur"> Catur</td>
                                        <td><input type="checkbox" name="hobi" value="Golf"> Golf</td>
                                    </tr>
                                </table>
                            </fieldset>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2" align="right" style="
                            border-top: 2px solid black;
                            border-bottom: 5px solid black; 
                            padding: 5px;">
                            <input type="submit" value="Submit">
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</form>

</body>
</html>
