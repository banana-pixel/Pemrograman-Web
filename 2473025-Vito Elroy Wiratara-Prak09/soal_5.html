<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473025 - Vito Elroy Wiratara</title>
    <script src="jquery-4.0.0.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; }
        .perusahaan {
            margin-bottom: 5px;
        }
        
        #cari {
            margin-bottom: 15px;
            width: 200px;
        }
    </style>
    <script>
        $(document).ready(function () {
            $("#cari").keyup(function () {
                let kataKunci = $(this).val().toLowerCase();

                $(".perusahaan").css("color", "black");

                if (kataKunci !== "") {
                    $(".perusahaan").each(function () {
                        let namaPerusahaan = $(this).text().toLowerCase();

                        if (namaPerusahaan.includes(kataKunci)) {
                            $(this).css("color", "red");
                        }
                    });
                }
            });
        });
    </script>
</head>
<body>
    <input type="text" id="cari" placeholder="Cari...">
    
    
    <div>
        <div class="perusahaan">Sun Microsystem</div>
        <div class="perusahaan">Apache Software Foundation</div>
        <div class="perusahaan">Oracle Coorporation</div>
        <div class="perusahaan">International Bussiness Machines</div>
        <div class="perusahaan">Microsoft Coorporation</div>
        <div class="perusahaan">Apple Inc</div>
        <div class="perusahaan">Sap Ag</div>
        <div class="perusahaan">Accenture</div>
        <div class="perusahaan">Computer Sciences Coorporation</div>
        <div class="perusahaan">Google</div>
        <div class="perusahaan">Softbank</div>
        <div class="perusahaan">Yahoo</div>
    </div>
</body>
</html>
