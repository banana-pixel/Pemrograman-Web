<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473025 - Vito Elroy Wiratara</title>
    <script src="jquery-4.0.0.min.js"></script>
    <style>
        body { font-family: sans-serif; }
        .daftar-nama {
            margin-top: 10px;
        }
        
        .nama {
            margin-bottom: 5px;
        }
    </style>
    <script>
        $(document).ready(function () {
            $("#btn-add").click(function () {
                let inputNama = $("#teks-nama").val();
                if (inputNama !== "") {
                    $("<div class='nama'>" + inputNama + "</div>").appendTo(".daftar-nama");
                    $("#teks-nama").val(""); 
                }
            });
            $("#btn-search").click(function () {
                let cari = $("#teks-nama").val();
                
                $(".nama").css("text-decoration", "none");
                
                if (cari !== "") {
                    $(".nama:contains('" + cari + "')").css("text-decoration", "underline");
                }
            });
        });
    </script>
</head>
<body>
    <input type="text" id="teks-nama">
    <button id="btn-add">Add</button>
    <button id="btn-search">Search</button>


    <div class="daftar-nama">
        <div class="nama">John Resig</div>
        <div class="nama">George Martin</div>
        <div class="nama">Malcom John Sinclair</div>
        <div class="nama">J. Ohn</div>
    </div>
</body>
</html>
