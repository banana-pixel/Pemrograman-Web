<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473025 - Vito Elroy Wiratara</title>
    <script src="jquery-4.0.0.min.js"></script>
    <style>
        .menu-utama {
            list-style-type: none;
            display: flex;
            padding: 0;
            margin: 0;
        }
        
        li.item {
            background-color: hotpink; 
            color: white;
            width: 150px;
            padding: 10px;
            margin-right: 8px;
            position: relative;
            text-decoration: underline;
            cursor: pointer;
            text-align: left;
            box-sizing: border-box; 
        }
        
        li.item ol {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: white;
            border: 2px solid hotpink; 
            width: 100%; 
            padding: 0;
            margin: 0;
            list-style-type: none;
            box-sizing: border-box;
        }
        
        
        li.item ol li {
            color: black;
            padding: 8px;
            text-decoration: underline;
        }
        
        li.item ol li:hover {
            background-color: #f9f9f9;
        }
    </style>
    <script>
        $(document).ready(function () {
            $("li.item ol").hide();

            $("li.item").hover(
                function () {
                    $(this).children("ol").stop(true, true).show();
                },
                function () {
                    $(this).children("ol").stop(true, true).hide();
                }
            );
        });
    </script>
</head>
<body>
    <ol class="menu-utama">
        <li class="item">
            jQuery
            <ol>
                <li>Download</li>
                <li>Documentation</li>
                <li>Blog</li>
            </ol>
        </li>
        <li class="item">
            Community
            <ol>
                <li>Mailing List</li>
                <li>Tutorials</li>
                <li>Demos</li>
                <li>Plugins</li>
            </ol>
        </li>
        <li class="item">
            Development
            <ol>
              
                <li>Source Code</li>
                <li>Bug Tracking</li>
                <li>Recent Changes</li>
            </ol>
        </li>
    </ol>
</body>
</html>
