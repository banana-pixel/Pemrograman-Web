<!DOCTYPE html>
<html>
<head>
    <title>2473025 - Vito Elroy Wiratara</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            margin: 20px;
        }
        .tabel-input {
            margin-bottom: 15px;
        }
        .tabel-input td {
            padding: 3px;
        }
        .tabel-hasil {
            border-collapse: collapse;
            text-align: center;
            font-size: 24px;
        }
        .tabel-hasil td {
            border: 2px solid black;
            width: 60px;
            height: 45px;
        }
    </style>
</head>
<body>

    <table class="tabel-input">
        <tr>
            <td>Angka Pertama</td>
            <td>:</td>
            <td><input type="text" id="angka1"></td>
        </tr>
        <tr>
            <td>Angka Kedua</td>
            <td>:</td>
            <td><input type="text" id="angka2"></td>
        </tr>
        <tr>
            <td colspan="3">
                <button onclick="hitung()">Count</button>
            </td>
        </tr>
    </table>

    <table class="tabel-hasil">
        <tr>
            <td id="t1"></td>
            <td>+</td>
            <td id="t2"></td>
            <td>=</td>
            <td id="h1"></td>
        </tr>
        <tr>
            <td id="k1"></td>
            <td>-</td>
            <td id="k2"></td>
            <td>=</td>
            <td id="h2"></td>
        </tr>
    </table>

    <script>
        function hitung() {
            let a = document.getElementById("angka1").value;
            let b = document.getElementById("angka2").value;
            let n1 = parseInt(a);
            let n2 = parseInt(b);

            if (isNaN(n1) && isNaN(n2)) {
                alert("angka pertama dan kedua harus angka");
                return;
            } else if (isNaN(n1)) {
                alert("angka pertama bukan angka");
                return;
            } else if (isNaN(n2)) {
                alert("angka kedua harus angka");
                return;
            }

            document.getElementById("t1").innerHTML = n1;
            document.getElementById("t2").innerHTML = n2;
            document.getElementById("h1").innerHTML = n1 + n2;
            document.getElementById("k1").innerHTML = n1;
            document.getElementById("k2").innerHTML = n2;
            document.getElementById("h2").innerHTML = n1 - n2;
        }
    </script>

</body>
</html>
